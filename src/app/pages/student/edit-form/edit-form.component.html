<div class="container card my-3 p-0">
  <h5 class="card-header">Login Form</h5>
  <div class="card-body">
    <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Firstname</label>
        <input
          type="text"
          formControlName="firstName"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['firstName'].errors }"
        />
        @if (submitted && form['firstName'].errors) {
          <div class="invalid-feedback">
            @if (form['firstName'].errors?.['required']) {
              <div>Firstname is required</div>
            }
          </div>
        }
      </div>
      <div class="form-group">
        <label>Lastname</label>
        <input
          type="text"
          formControlName="lastName"
          class="form-control"
          [ngClass]="{ 'is-invalid': submitted && form['lastName'].errors }"
        />
        @if (submitted && form['lastName'].errors) {
          <div class="invalid-feedback">
            @if (form['lastName'].errors?.['required']) {
              <div>Lastname is required</div>
            }
          </div>
        }
      </div>

      <div class="text-center">
        <button class="btn btn-primary mr-1">Edit</button>
        <button class="btn btn-secondary" type="reset" (click)="onReset()">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
