<div class="container my-3 p-0">
  <a routerLink="/student" type="button" class="mb-4 d-flex align-items-center text-secondary">
    <mat-icon fontIcon="keyboard_arrow_left"></mat-icon>
    Back to list
  </a>
  <div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h1 class="h5 m-0">Student details</h1>
      <a [routerLink]="`/student/${student?.id}/edit`" [ariaDisabled]="!student" type="button" class="btn btn-outline-primary">
        Edit
      </a>
    </div>
    <div class="card-body d-flex">
      <div class="card mr-4">
        <mat-icon class="user-icon" aria-label="Student profile picture" fontIcon="account_circle"></mat-icon>
      </div>
      <div class="w-full">
        <h2 class="h5 m-0">{{ student?.firstName }} {{ student?.lastName }}</h2>
      </div>
    </div>
  </div>
</div>
